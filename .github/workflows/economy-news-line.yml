name: Economy News LINE

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: economy-news-line
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_OPENAI: "false"
          JAPANESE_RSS_ENABLED: "true"
          NEWS_SOURCE_PRIORITY: "newsapi_jp"
          DB_PATH: "data/news_notifications.db"
          MAX_NEWS_PER_RUN: "30"
          MAX_NOTIFICATIONS_PER_RUN: "5"
          NOTIFY_MIN_SCORE: "4"
          LOG_LEVEL: "INFO"
        run: python main.py --once

      - name: Persist sent-news database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news_notifications.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update sent news database"
            git pull --rebase
            git push
          fi
