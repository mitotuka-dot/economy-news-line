name: X Reply Radar

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-reply-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m app.main
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DRY_RUN: "false"
          DB_PATH: data/x_reply_radar.db
      - name: Persist SQLite notification state
        run: |
          if [ -f data/x_reply_radar.db ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/x_reply_radar.db
            if git diff --cached --quiet; then
              echo "No SQLite notification state changes."
            else
              git commit -m "chore: update x reply radar notification state"
              git pull --rebase
              git push
            fi
          else
            echo "data/x_reply_radar.db was not created."
          fi
